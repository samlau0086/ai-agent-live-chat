services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-agent-live-chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent_live_chat}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_agent_live_chat}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-agent-live-chat
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      STORE_DRIVER: ${STORE_DRIVER:-prisma}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/ai_agent_live_chat}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - app-data:/app/.data

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    env_file:
      - .env.production
    environment:
      STORE_DRIVER: ${STORE_DRIVER:-prisma}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/ai_agent_live_chat}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  app-data:
  postgres-data:
